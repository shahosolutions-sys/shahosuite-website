<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Landlord Suite properties dashboard preview with demo data">
  <defs>
    <linearGradient id="ll-header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="ll-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style>
    @keyframes ll-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes ll-slide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ll-highlight { 0%,100%{stroke:#059669;stroke-width:2} 50%{stroke:#10b981;stroke-width:3} }
    .ll-badge-red { animation: ll-pulse 2s ease-in-out infinite; }
    .ll-badge-amber { animation: ll-pulse 2.4s ease-in-out infinite; }
    .ll-prop { animation: ll-slide .7s ease forwards; opacity:0; }
    .ll-prop-2 { animation-delay:.12s; }
    .ll-prop-3 { animation-delay:.24s; }
    .ll-active-nav { animation: ll-highlight 3s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .ll-badge-red,.ll-badge-amber,.ll-prop,.ll-active-nav { animation:none; opacity:1; stroke-width:0; }
    }
  </style>

  <rect width="960" height="540" fill="#f1f5f9"/>
