<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Wholesale Suite dashboard preview with demo data">
  <defs>
    <linearGradient id="wh-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="wh-kpi-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="wh-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style>
    @keyframes wh-pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
    @keyframes wh-bar-grow { from{transform:scaleX(0)} to{transform:scaleX(1)} }
    @keyframes wh-line-draw { from{stroke-dashoffset:320} to{stroke-dashoffset:0} }
    @keyframes wh-fade-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .wh-alert { animation: wh-pulse 2.4s ease-in-out infinite; }
    .wh-bar { transform-origin: left center; animation: wh-bar-grow 1.8s ease forwards; }
    .wh-chart-line { stroke-dasharray:320; animation: wh-line-draw 2.6s ease forwards; }
    .wh-card { animation: wh-fade-in .8s ease forwards; }
    .wh-card-2 { animation-delay:.15s; opacity:0; }
    .wh-card-3 { animation-delay:.3s; opacity:0; }
    .wh-card-4 { animation-delay:.45s; opacity:0; }
    @media (prefers-reduced-motion: reduce) {
      .wh-alert,.wh-bar,.wh-chart-line,.wh-card { animation:none; opacity:1; stroke-dashoffset:0; transform:none; }
    }
  </style>

  <!-- background -->
  <rect width="960" height="540" fill="#f1f5f9"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="148" height="540" fill="#fff" stroke="#e2e8f0"/>
  <text x="18" y="28" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" font-weight="700" letter-spacing="1">MAIN</text>
  <rect x="12" y="36" width="124" height="26" rx="6" fill="#eff6ff"/>
  <text x="24" y="52" fill="#1d4ed8" font-family="system-ui,sans-serif" font-size="10" font-weight="700">Dashboard</text>
  <text x="24" y="78" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Customers</text>
  <text x="18" y="102" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" font-weight="700" letter-spacing="1">INVENTORY</text>
  <text x="24" y="120" fill="#64748b" font-family="system-ui,sans-serif" font-size="9.5">Products</text>
  <text x="24" y="138" fill="#64748b" font-family="system-ui,sans-serif" font-size="9.5">Purchase Orders</text>
  <text x="24" y="156" fill="#64748b" font-family="system-ui,sans-serif" font-size="9.5">Stock Movements</text>
  <text x="18" y="180" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" font-weight="700" letter-spacing="1">SALES</text>
  <text x="24" y="198" fill="#64748b" font-family="system-ui,sans-serif" font-size="9.5">Orders · Invoices</text>
  <text x="18" y="222" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" font-weight="700" letter-spacing="1">FINANCE</text>
  <text x="24" y="240" fill="#64748b" font-family="system-ui,sans-serif" font-size="9.5">Accounting</text>
  <text x="24" y="258" fill="#64748b" font-family="system-ui,sans-serif" font-size="9.5">Analytics</text>
  <rect x="12" y="500" width="124" height="28" rx="6" fill="#fef2f2"/>
  <text x="24" y="518" fill="#dc2626" font-family="system-ui,sans-serif" font-size="9" font-weight="700">Logout</text>

  <!-- header -->
  <rect x="148" y="0" width="812" height="52" fill="url(#wh-header)"/>
  <rect x="168" y="14" width="28" height="28" rx="6" fill="#fff" opacity=".15"/>
  <text x="204" y="26" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="800">Demo Wholesale Co.</text>
  <text x="204" y="40" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="9">Wednesday · Demo data</text>
  <circle cx="880" cy="26" r="14" fill="#fff" opacity=".2"/>
  <text x="872" y="30" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">A</text>
  <text x="898" y="30" fill="#fff" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Admin</text>

  <!-- KPI cards -->
  <g filter="url(#wh-shadow)">
    <g class="wh-card">
      <rect x="168" y="68" width="178" height="72" rx="10" fill="url(#wh-kpi-blue)"/>
      <text x="184" y="92" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="9" font-weight="600">MONTHLY REVENUE</text>
      <text x="184" y="118" fill="#fff" font-family="system-ui,sans-serif" font-size="22" font-weight="800">Ł12,450</text>
      <text x="184" y="132" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="8">+18% vs last month</text>
    </g>
    <g class="wh-card wh-card-2">
      <rect x="358" y="68" width="178" height="72" rx="10" fill="#fff" stroke="#e2e8f0"/>
      <text x="374" y="92" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="600">PENDING ORDERS</text>
      <text x="374" y="118" fill="#0f172a" font-family="system-ui,sans-serif" font-size="22" font-weight="800">3</text>
      <text x="374" y="132" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">Awaiting processing</text>
    </g>
    <g class="wh-card wh-card-3">
      <rect x="548" y="68" width="178" height="72" rx="10" fill="#fef2f2" stroke="#fecaca"/>
      <text x="564" y="92" fill="#991b1b" font-family="system-ui,sans-serif" font-size="9" font-weight="600">OVERDUE INVOICES</text>
      <text x="564" y="118" fill="#dc2626" font-family="system-ui,sans-serif" font-size="22" font-weight="800">12</text>
      <text x="564" y="132" fill="#f87171" font-family="system-ui,sans-serif" font-size="8">Need attention</text>
    </g>
    <g class="wh-card wh-card-4">
      <rect x="738" y="68" width="178" height="72" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="754" y="92" fill="#065f46" font-family="system-ui,sans-serif" font-size="9" font-weight="600">LOW STOCK</text>
      <text x="754" y="118" fill="#059669" font-family="system-ui,sans-serif" font-size="22" font-weight="800">2</text>
      <text x="754" y="132" fill="#34d399" font-family="system-ui,sans-serif" font-size="8">Restock needed</text>
    </g>
  </g>

  <!-- needs attention -->
  <rect x="168" y="152" width="748" height="28" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="184" y="170" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Needs attention</text>
  <rect class="wh-alert" x="280" y="160" width="88" height="14" rx="7" fill="#fecaca"/>
  <text x="292" y="170" fill="#991b1b" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700">12 overdue</text>
  <rect class="wh-alert" x="378" y="160" width="72" height="14" rx="7" fill="#fef3c7"/>
  <text x="388" y="170" fill="#92400e" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700">2 low stock</text>
  <rect class="wh-alert" x="460" y="160" width="96" height="14" rx="7" fill="#d1fae5"/>
  <text x="468" y="170" fill="#065f46" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700">3 expiring soon</text>

  <!-- chart panel -->
  <rect x="168" y="192" width="460" height="200" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#wh-shadow)"/>
  <text x="188" y="216" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11" font-weight="800">Revenue overview</text>
  <line x1="188" y1="360" x2="608" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <polyline class="wh-chart-line" points="188,340 240,310 300,320 360,270 420,290 480,240 540,260 600,220" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="188,340 240,310 300,320 360,270 420,290 480,240 540,260 600,220 600,360 188,360" fill="#2563eb" opacity=".08"/>

  <!-- top customers -->
  <rect x="644" y="192" width="272" height="200" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#wh-shadow)"/>
  <text x="664" y="216" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11" font-weight="800">Top customers</text>
  <text x="864" y="216" fill="#2563eb" font-family="system-ui,sans-serif" font-size="8" font-weight="700">View all</text>
  <text x="664" y="242" fill="#334155" font-family="system-ui,sans-serif" font-size="9">Acme Foods Ltd</text>
  <rect class="wh-bar" x="664" y="248" width="180" height="6" rx="3" fill="#2563eb" opacity=".7"/>
  <text x="864" y="248" fill="#64748b" font-family="system-ui,sans-serif" font-size="8">Ł4.2k</text>
  <text x="664" y="274" fill="#334155" font-family="system-ui,sans-serif" font-size="9">Portsmouth Cash</text>
  <rect class="wh-bar" x="664" y="280" width="130" height="6" rx="3" fill="#3b82f6" opacity=".6" style="animation-delay:.2s"/>
  <text x="864" y="284" fill="#64748b" font-family="system-ui,sans-serif" font-size="8">Ł2.8k</text>
  <text x="664" y="306" fill="#334155" font-family="system-ui,sans-serif" font-size="9">South Coast Grocers</text>
  <rect class="wh-bar" x="664" y="312" width="90" height="6" rx="3" fill="#60a5fa" opacity=".5" style="animation-delay:.4s"/>
  <text x="864" y="316" fill="#64748b" font-family="system-ui,sans-serif" font-size="8">Ł1.9k</text>

  <!-- restock -->
  <rect x="168" y="406" width="748" height="110" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#wh-shadow)"/>
  <text x="188" y="430" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11" font-weight="800">Restock priority</text>
  <text x="848" y="430" fill="#2563eb" font-family="system-ui,sans-serif" font-size="8" font-weight="700">View stock</text>
  <rect x="188" y="444" width="220" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="204" y="466" fill="#334155" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Organic Rice 25kg</text>
  <text x="204" y="482" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">SKU: WH-1042</text>
  <rect x="360" y="458" width="36" height="16" rx="8" fill="#fecaca"/>
  <text x="368" y="469" fill="#991b1b" font-family="system-ui,sans-serif" font-size="7" font-weight="700">0 OUT</text>
  <rect x="424" y="444" width="220" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="440" y="466" fill="#334155" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Sunflower Oil 5L</text>
  <text x="440" y="482" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">SKU: WH-2088 · Expires 28 Jun</text>
  <rect x="596" y="458" width="36" height="16" rx="8" fill="#fef3c7"/>
  <text x="602" y="469" fill="#92400e" font-family="system-ui,sans-serif" font-size="7" font-weight="700">LOW</text>
  <rect x="660" y="444" width="220" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="676" y="466" fill="#334155" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Tinned Tomatoes</text>
  <text x="676" y="482" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">SKU: WH-3310</text>
  <rect x="832" y="458" width="36" height="16" rx="8" fill="#fecaca"/>
  <text x="840" y="469" fill="#991b1b" font-family="system-ui,sans-serif" font-size="7" font-weight="700">0 OUT</text>

  <!-- demo badge -->
  <rect x="848" y="8" width="96" height="18" rx="9" fill="#fff" opacity=".18"/>
  <text x="862" y="20" fill="#fff" font-family="system-ui,sans-serif" font-size="8" font-weight="700">DEMO DATA</text>
</svg>
