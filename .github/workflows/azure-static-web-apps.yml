# Azure Static Web Apps CI/CD
# This workflow will build and deploy your static site to Azure Static Web Apps
# For repo: shahosuite-website, Azure app: shahosolutions-sys

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_BEACH_0D1184B03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e. PR comments)
          action: 'upload'
          app_location: "/" # Location of your application source code
          api_location: ""   # No API
          output_location: "/" # Output folder (for static HTML, use root)
          skip_app_build: true # No build step for plain HTML
